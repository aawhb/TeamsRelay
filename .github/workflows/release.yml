name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions: read-all

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up .NET
        # actions/setup-dotnet v5.4.0
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: "9.0.x"

      - name: Verify release metadata
        shell: pwsh
        run: |
          $version = (Get-Content -LiteralPath VERSION -Raw).Trim()
          $tag = "${{ github.ref_name }}"
          if ($tag -ne $version) {
            throw "Tag '$tag' does not match VERSION '$version'."
          }

      - name: Verify formatting
        shell: pwsh
        run: dotnet format TeamsRelay.sln --verify-no-changes --verbosity minimal

      - name: Build
        shell: pwsh
        run: dotnet build TeamsRelay.sln -nodeReuse:false

      - name: Test
        shell: pwsh
        run: dotnet test tests/TeamsRelay.Tests/TeamsRelay.Tests.csproj -nodeReuse:false

      - name: Audit dependencies
        shell: pwsh
        run: dotnet list TeamsRelay.sln package --vulnerable --include-transitive

      - name: Publish self-contained package
        shell: pwsh
        run: dotnet publish src/TeamsRelay.App/TeamsRelay.App.csproj -c Release -r win-x64 --self-contained true -o artifacts/publish-self-contained

      - name: Publish framework-dependent package
        shell: pwsh
        run: dotnet publish src/TeamsRelay.App/TeamsRelay.App.csproj -c Release -r win-x64 --self-contained false -o artifacts/publish

      - name: Create release zips
        id: package
        shell: pwsh
        run: |
          $version = (Get-Content -LiteralPath VERSION -Raw).Trim()
          $selfContainedDir = Join-Path $PWD "artifacts/publish-self-contained"
          $frameworkDependentDir = Join-Path $PWD "artifacts/publish"
          $selfContainedZipName = "TeamsRelay-win-x64-self-contained-$version.zip"
          $frameworkDependentZipName = "TeamsRelay-win-x64-$version.zip"
          $selfContainedZipPath = Join-Path $PWD $selfContainedZipName
          $frameworkDependentZipPath = Join-Path $PWD $frameworkDependentZipName

          foreach ($publishDirectory in @($selfContainedDir, $frameworkDependentDir)) {
            if (-not (Test-Path (Join-Path $publishDirectory "config.json") -PathType Leaf)) {
              throw "Published output is missing config.json: $publishDirectory"
            }
          }

          if (Test-Path $selfContainedZipPath) {
            Remove-Item $selfContainedZipPath -Force
          }

          if (Test-Path $frameworkDependentZipPath) {
            Remove-Item $frameworkDependentZipPath -Force
          }

          Compress-Archive -Path (Join-Path $selfContainedDir "*") -DestinationPath $selfContainedZipPath -Force
          Compress-Archive -Path (Join-Path $frameworkDependentDir "*") -DestinationPath $frameworkDependentZipPath -Force

          "self_contained_zip_path=$selfContainedZipPath" >> $env:GITHUB_OUTPUT
          "self_contained_zip_name=$selfContainedZipName" >> $env:GITHUB_OUTPUT
          "framework_dependent_zip_path=$frameworkDependentZipPath" >> $env:GITHUB_OUTPUT
          "framework_dependent_zip_name=$frameworkDependentZipName" >> $env:GITHUB_OUTPUT

      - name: Generate artifact attestations
        # actions/attest v4.1.1
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-path: |
            ${{ steps.package.outputs.self_contained_zip_name }}
            ${{ steps.package.outputs.framework_dependent_zip_name }}

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $selfContainedZipPath = "${{ steps.package.outputs.self_contained_zip_path }}"
          $frameworkDependentZipPath = "${{ steps.package.outputs.framework_dependent_zip_path }}"

          gh release view $env:TAG_NAME *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Output "Release $env:TAG_NAME already exists; skipping publish to preserve tag immutability."
          }
          else {
            gh release create $env:TAG_NAME `
              $selfContainedZipPath `
              $frameworkDependentZipPath `
              --title "TeamsRelay $env:TAG_NAME" `
              --notes "Windows self-contained and framework-dependent packages for TeamsRelay $env:TAG_NAME." `
              --verify-tag
          }
