version: 2

updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Denver
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      nuget-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Denver
    open-pull-requests-limit: 5
    labels:
      - dependencies
